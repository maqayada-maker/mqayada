packages:
  "framer-motion": "For beautiful page transitions and micro-interactions"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod validation integration with forms"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "lucide-react": "Beautiful consistent iconography"
  "date-fns": "For formatting dates in Arabic gracefully"

images:
  - path: "artifacts/mqayada/public/images/hero-bg.png"
    description: "Abstract professional financial wave background with deep blue and clean white gradients, modern corporate style, soft lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/mqayada/public/images/logo.png"
    description: "Minimal geometric logo mark for a finance platform, deep blue and teal, transparent background"
    aspect_ratio: "1:1"

notes:
  - RTL Layout is enforced globally via CSS (direction: rtl)
  - React Query hooks are imported from @workspace/api-client-react as generated by Orval
  - Zod is used for client-side form validation before sending requests to the API
